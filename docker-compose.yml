services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: loyalty
      DB_PASSWORD: loyalty_pass
      DB_NAME: loyalty_db
      APP_PORT: 3000
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: order.events
      KAFKA_GROUP_ID: loyalty-service-group
    volumes:
      - .:/app
      - go_cache:/root/.cache/go-build
      - go_pkg:/go/pkg/mod
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: loyalty_db
      MYSQL_USER: loyalty
      MYSQL_PASSWORD: loyalty_pass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uloyalty", "-ployalty_pass"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redpanda-console:
    image: redpandadata/console:latest
    ports:
      - "9000:8080"
    environment:
      CONFIG_FILEPATH: /dev/null
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  swagger:
    image: swaggerapi/swagger-ui
    ports:
      - "8082:8080"
    environment:
      SWAGGER_JSON: /docs/openapi.yaml
    volumes:
      - ./docs:/docs
    restart: unless-stopped

volumes:
  mysql_data:
  go_cache:
  go_pkg:
